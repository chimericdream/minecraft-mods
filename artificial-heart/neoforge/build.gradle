import org.gradle.jvm.tasks.Jar

plugins {
    id 'com.gradleup.shadow'
}

architectury {
    neoForge()
}

loom {
    accessWidenerPath = project(":artificial-heart:common").loom.accessWidenerPath

    neoForge {
        convertAccessWideners(tasks.named("shadowJar", Jar), "artificialheart.accesswidener")
    }
}

configurations {
    developmentNeoForge.extendsFrom common
}

dependencies {
    common(project(path: ':artificial-heart:common')) { transitive false }
    shadowBundle project(path: ':artificial-heart:common', configuration: 'transformProductionNeoForge')
}
