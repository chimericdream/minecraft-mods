# Automatically build the project and run any configured tests for every push
# and submitted pull request. This can help catch issues that only occur on
# certain platforms or Java versions, and provides a first line of defence
# against bad commits.

name: build
on: [ pull_request, push ]

jobs:
  build:
    strategy:
      matrix:
        # Must be >= the `options.release` in build.gradle (currently 25).
        java: [
          25,
        ]
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v3
      - name: setup jdk ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Bun
        run: npm i -g bun
      - name: Install npm deps
        run: bun i
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build
        # No GITHUB_TOKEN needed: chimeric-lib is an in-build project() dependency, so the build no
        # longer resolves anything from GitHub Packages. This lets fork PRs build without secrets.
        run: bun run build
      - name: capture build artifacts
        if: ${{ matrix.java == '25' }} # Only upload artifacts from one JDK
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: |
            ./**/common/build/libs/
            ./**/fabric/build/libs/
            ./**/neoforge/build/libs/
