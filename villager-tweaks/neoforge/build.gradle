import org.gradle.jvm.tasks.Jar

plugins {
    id 'com.gradleup.shadow'
}

architectury {
    neoForge()
}

loom {
    accessWidenerPath = project(":villager-tweaks:common").loom.accessWidenerPath

    neoForge {
        convertAccessWideners(tasks.named("shadowJar", Jar), "villagertweaks.accesswidener")
    }
}

configurations {
    developmentNeoForge.extendsFrom common
}

dependencies {
    common(project(path: ':villager-tweaks:common')) { transitive false }
    shadowBundle project(path: ':villager-tweaks:common', configuration: 'transformProductionNeoForge')
}
