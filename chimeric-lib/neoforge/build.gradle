import org.gradle.jvm.tasks.Jar

plugins {
    id 'com.gradleup.shadow'
}

architectury {
    neoForge()
}

//loom {
//    accessWidenerPath = project(":chimeric-lib:common").loom.accessWidenerPath
//}

configurations {
    common {
        canBeResolved = true
        canBeConsumed = false
    }
    compileClasspath.extendsFrom common
    runtimeClasspath.extendsFrom common
    developmentNeoForge.extendsFrom common

    // Files in this configuration will be bundled into your mod using the Shadow plugin.
    // Don't use the `shadow` configuration from the plugin itself as it's meant for excluding files.
    shadowBundle {
        canBeResolved = true
        canBeConsumed = false
    }
}

dependencies {
    common(project(path: ':chimeric-lib:common')) { transitive false }
    shadowBundle project(path: ':chimeric-lib:common', configuration: 'transformProductionNeoForge')
}

//jar {
//    atAccessWideners.add("chimericlib.accesswidener")
//}

jar {
    archiveClassifier = "raw"
}

shadowJar {
    dependsOn(jar)
    mainSpec.sourcePaths.clear()
    from(zipTree(jar.archiveFile))

    configurations = [project.configurations.shadowBundle]
    archiveClassifier = null
}