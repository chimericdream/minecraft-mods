plugins {
    id 'com.gradleup.shadow'
}

architectury {
    neoForge()
}

configurations {
    developmentNeoForge.extendsFrom common
}

dependencies {
    common(project(path: ':sponj:common')) { transitive false }
    shadowBundle project(path: ':sponj:common', configuration: 'transformProductionNeoForge')
}
